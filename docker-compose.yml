networks:
  smarthr-mesh:
    driver: bridge

services:
  # 1. FastAPI Core HRMS Engine
  backend-engine:
    build:
      context: ./smarthr-backend
      dockerfile: Dockerfile
    container_name: smarthr-backend-container
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:secret@postgres-db:5432/smarthr
      - OLLAMA_MODEL=llama3
    volumes:
      - ./smarthr-backend:/workspace
    networks:
      - smarthr-mesh
    restart: always

  # 2. React UI Enterprise Command Canvas
  frontend-canvas:
    build:
      context: ./smarthr-frontend
      dockerfile: Dockerfile
    container_name: smarthr-frontend-container
    ports:
      - "3000:80"
    depends_on:
      - backend-engine
    networks:
      - smarthr-mesh
    restart: always