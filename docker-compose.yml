networks:
  smarthr-mesh:
    driver: bridge

services:
  # 1. FastAPI Core HRMS Engine
  backend-engine:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smarthr-backend-container
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////workspace/smarthr.db
      - REDIS_URL=redis://smarthr-redis-cache:6379/0
      - MEMGRAPH_HOST=smarthr-graph-db
      - MEMGRAPH_PORT=7687
    volumes:
      - ./backend:/workspace
    networks:
      - smarthr-mesh
    restart: always
    depends_on:
      - ollama-service
      - redis-cache
      - graph-db

  # 2. React UI Enterprise Command Canvas
  frontend-canvas:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smarthr-frontend-container
    ports:
      - "3000:80"
    depends_on:
      - backend-engine
    networks:
      - smarthr-mesh
    restart: always

  # 3. Local Model Provider
  ollama-service:
    image: ollama/ollama:latest
    container_name: smarthr-ollama-container
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_storage:/root/.ollama
    networks:
      - smarthr-mesh
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4096M
        reservations:
          memory: 3000M

  # ⚡ Redis In-Memory Cache
  redis-cache:
    image: docker.io/library/redis:7-alpine
    container_name: smarthr-redis-cache
    ports:
      - "6380:6379"
    networks:
      - smarthr-mesh
    restart: always

  # 📊 Memgraph High-Speed Graph DB
  graph-db:
    image: memgraph/memgraph-mage:latest
    container_name: smarthr-graph-db
    ports:
      - "7687:7687"
    networks:
      - smarthr-mesh
    restart: always