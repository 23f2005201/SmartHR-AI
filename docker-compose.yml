networks:
  smarthr-mesh:
    driver: bridge

services:
  # 1. FastAPI Core HRMS Engine
  backend-engine:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smarthr-backend-container
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////workspace/smarthr.db
      - OLLAMA_MODEL=llama3.2:1b
    volumes:
      - ./backend:/workspace
    networks:
      - smarthr-mesh
    restart: always
    depends_on:
      - ollama-service

  # 2. React UI Enterprise Command Canvas
  frontend-canvas:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smarthr-frontend-container
    ports:
      - "3000:80"
    depends_on:
      - backend-engine
    networks:
      - smarthr-mesh
    restart: always
  ollama-service:
    image: ollama/ollama:latest
    container_name: smarthr-ollama-container
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_storage:/root/.ollama
    networks:
      - smarthr-mesh
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4096M
        reservations:
          memory: 3000M